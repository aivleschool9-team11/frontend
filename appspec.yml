version: 0.0
os: linux

# =====================================================================
# AIVLE School - CD 단계 (CodeDeploy / EC2 + nginx 배포 기준)
# Vite 빌드 산출물(dist/) 을 nginx 웹 루트로 배포합니다.
# 이 파일도 레포 "최상위(root)" 에 위치해야 합니다.
# =====================================================================

files:
  # 빌드 산출물(dist 내부 파일들) -> nginx 웹 루트로 복사
  - source: dist/
    destination: /var/www/html

# 배포 생명주기 훅. 각 스크립트는 scripts/ 폴더에 둡니다.
hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 120
      runas: root
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 120
      runas: root
